name: E2E Android

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "lib/**"
      - "integration_test/**"
      - "pubspec.yaml"
      - ".github/workflows/e2e-android.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Isar code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run integration test on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          script: flutter test integration_test/app_flow_test.dart -d emulator-5554
