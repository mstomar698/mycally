name: mycally
description: 'A Calendar diary to record daily purchases/expenses and show them in clear and concise graphs and tables.'

publish_to: 'none'

version: 1.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  easy_localization: ^3.0.7
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/lang/en.json
    - assets/lang/hi.json
    - assets/images/mycally_logo.png


  fonts:
    - family: Alkia
      fonts:
        - asset: fonts/Alkia.ttf
    - family: Trajan Pro
      fonts:
        - asset: fonts/TrajanPro-Regular.ttf
        - asset: fonts/TrajanPro-Bold.otf
          weight: 700
