name: mycally
description: 'A Calendar diary to record daily purchases/expenses and show them in clear and concise graphs and tables.'

publish_to: 'none'

version: 1.2.1+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  easy_localization: ^3.0.7
  shared_preferences: ^2.3.5
  url_launcher: ^6.3.1
  package_info_plus: ^4.0.1
  isar: ^3.1.0  
  isar_flutter_libs:
    git: 
      url: https://github.com/MrLittleWhite/isar_flutter_libs.git # fixes namespace issue of Isar on gradle 8.x.x+
  path_provider: ^2.0.12
  dropdown_search: ^5.0.5
  image_picker: ^0.8.7+4
  intl: ^0.20.2
  table_calendar: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: any
  isar_generator: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/lang/en.json
    - assets/lang/hi.json
    - assets/images/mycally_logo.png
    - assets/images/login_page_logo.png
    - assets/images/login_screen_icon.png
    - assets/images/default_profile.jpg

  fonts:
    - family: Alkia
      fonts:
        - asset: fonts/Alkia.ttf
    - family: Trajan Pro
      fonts:
        - asset: fonts/TrajanPro-Regular.ttf
        - asset: fonts/TrajanPro-Bold.otf
          weight: 700
